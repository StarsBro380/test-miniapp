<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обратная связь</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .subtitle { color: var(--tg-theme-hint-color, #8e8e93); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        input, textarea {
            width: 100%; padding: 14px 16px; font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #c6c6c8); border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            color: var(--tg-theme-text-color, #000000); font-family: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        .btn {
            width: 100%; padding: 16px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer; margin-top: 8px;
        }
        .btn-primary { background: var(--tg-theme-button-color, #007aff); color: #ffffff; }
        .btn-secondary { background: var(--tg-theme-secondary-bg-color, #f2f2f7); color: var(--tg-theme-text-color, #000000); }
        .btn-danger { background: #ff3b30; color: #ffffff; }
        .btn:disabled { opacity: 0.5; }
        .ticket-card {
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
            cursor: pointer;
        }
        .ticket-card .status { font-size: 14px; margin-bottom: 4px; }
        .ticket-card .preview { color: var(--tg-theme-hint-color, #8e8e93); font-size: 13px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px; text-align: center;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            border-radius: 10px; cursor: pointer; font-weight: 500;
        }
        .tab.active { background: var(--tg-theme-button-color, #007aff); color: #fff; }
        .reply-block {
            background: #e8f5e9; border-radius: 8px; padding: 10px;
            margin-top: 8px; font-size: 14px;
        }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Загрузка -->
        <div id="loading" class="loading">⏳ Загрузка...</div>
        
        <!-- Главный экран -->
        <div id="main-screen" style="display:none;">
            <div class="tabs">
                <div class="tab active" id="tab-new" onclick="showTab('new')">📝 Новое</div>
                <div class="tab" id="tab-my" onclick="showTab('my')">📋 Мои обращения</div>
            </div>
            
            <!-- Форма -->
            <div id="tab-new-content">
                <h1>📝 Обратная связь</h1>
                <p class="subtitle">Опишите ваш вопрос или предложение</p>
                
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" id="name" placeholder="Как к вам обращаться?">
                </div>
                
                <div class="form-group">
                    <label>Сообщение *</label>
                    <textarea id="message" placeholder="Опишите ваш вопрос..."></textarea>
                </div>
                
                <button class="btn btn-primary" id="submit-btn" disabled onclick="submitTicket()">📤 Отправить</button>
            </div>
            
            <!-- Список обращений -->
            <div id="tab-my-content" style="display:none;">
                <h2>📋 Мои обращения</h2>
                <div id="tickets-list"></div>
            </div>
        </div>
        
        <!-- Детали обращения -->
        <div id="ticket-detail" style="display:none;">
            <button class="btn btn-secondary" onclick="goBack()">← Назад</button>
            <div id="ticket-detail-content" style="margin-top:16px;"></div>
        </div>
        
        <!-- Ответ админа -->
        <div id="reply-screen" style="display:none;">
            <button class="btn btn-secondary" onclick="goBack()">← Назад</button>
            <h2 style="margin-top:16px;">💬 Ответить</h2>
            <div class="form-group">
                <textarea id="reply-text" placeholder="Текст ответа..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="sendReply()">📤 Отправить ответ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = "https://feedback-bot-1-6z88.onrender.com";
        const ADMIN_IDS = [39444699, 5711571612];
        
        let currentUser = null;
        let currentTicketId = null;
        let currentReplyUserId = null;
        
        // Инициализация
        function init() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = tg.initDataUnsafe.user;
                document.getElementById('name').value = currentUser.first_name || '';
                
                if (currentUser.id) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('main-screen').style.display = 'block';
                    
                    // Валидация
                    document.getElementById('message').addEventListener('input', function() {
                        document.getElementById('submit-btn').disabled = this.value.trim().length === 0;
                    });
                }
            } else {
                document.getElementById('loading').innerHTML = '❌ Ошибка: нет данных пользователя';
            }
        }
        
        // Переключение вкладок
        function showTab(tab) {
            document.getElementById('tab-new').classList.toggle('active', tab === 'new');
            document.getElementById('tab-my').classList.toggle('active', tab === 'my');
            document.getElementById('tab-new-content').style.display = tab === 'new' ? 'block' : 'none';
            document.getElementById('tab-my-content').style.display = tab === 'my' ? 'block' : 'none';
            
            if (tab === 'my') loadMyTickets();
        }
        
        // Загрузка обращений
        async function loadMyTickets() {
            const list = document.getElementById('tickets-list');
            list.innerHTML = '⏳ Загрузка...';
            
            try {
                const resp = await fetch(API_URL + '/api/tickets?user_id=' + currentUser.id);
                const data = await resp.json();
                
                if (!data.ok || !data.tickets.length) {
                    list.innerHTML = '<p>У вас пока нет обращений.</p>';
                    return;
                }
                
                list.innerHTML = '';
                for (const ticket of data.tickets) {
                    const card = document.createElement('div');
                    card.className = 'ticket-card';
                    card.onclick = function() { showTicketDetail(ticket); };
                    
                    const status = ticket.status === 'open' ? '🟢 Открыто' : '🔴 Закрыто';
                    const msgs = ticket.messages || [];
                    const preview = msgs.length > 0 ? msgs[0].substring(0, 50) : '...';
                    const replies = ticket.replies || [];
                    const replyInfo = replies.length > 0 ? ' | 💬' + replies.length : '';
                    
                    card.innerHTML = `
                        <div class="status">${status} #${ticket.id}${replyInfo}</div>
                        <div class="preview">${preview}</div>
                    `;
                    list.appendChild(card);
                }
            } catch (e) {
                list.innerHTML = '<p>❌ Ошибка загрузки</p>';
            }
        }
        
        // Детали обращения
        function showTicketDetail(ticket) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('ticket-detail').style.display = 'block';
            
            const content = document.getElementById('ticket-detail-content');
            const status = ticket.status === 'open' ? '🟢 Открыто' : '🔴 Закрыто';
            
            let html = `<h2>📌 Обращение #${ticket.id}</h2>`;
            html += `<p>Статус: ${status}</p>`;
            
            if (ticket.messages) {
                html += '<h3>📝 Сообщения:</h3>';
                for (const msg of ticket.messages) {
                    html += `<p>• ${msg}</p>`;
                }
            }
            
            if (ticket.replies && ticket.replies.length > 0) {
                html += '<h3>📢 Ответы:</h3>';
                for (const reply of ticket.replies) {
                    html += `<div class="reply-block"><b>${reply.admin}</b> (${reply.time}):<br>${reply.text}</div>`;
                }
            }
            
            // Кнопка "Ответить" для админов
            if (ADMIN_IDS.includes(currentUser.id) && ticket.status === 'open') {
                currentTicketId = ticket.id;
                currentReplyUserId = ticket.user_id;
                html += `<button class="btn btn-primary" onclick="showReplyScreen()" style="margin-top:12px;">💬 Ответить</button>`;
            }
            
            content.innerHTML = html;
        }
        
        // Экран ответа
        function showReplyScreen() {
            document.getElementById('ticket-detail').style.display = 'none';
            document.getElementById('reply-screen').style.display = 'block';
        }
        
        // Отправка ответа
        async function sendReply() {
            const text = document.getElementById('reply-text').value.trim();
            if (!text) {
                tg.showAlert('Введите текст ответа');
                return;
            }
            
            try {
                const resp = await fetch(API_URL + '/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_id: currentUser.id,
                        user_id: currentReplyUserId,
                        ticket_id: currentTicketId,
                        text: text
                    })
                });
                
                const data = await resp.json();
                if (data.ok) {
                    tg.showAlert('✅ Ответ отправлен!');
                    document.getElementById('reply-screen').style.display = 'none';
                    document.getElementById('main-screen').style.display = 'block';
                    document.getElementById('reply-text').value = '';
                    showTab('my');
                } else {
                    tg.showAlert('❌ Ошибка: ' + data.error);
                }
            } catch (e) {
                tg.showAlert('❌ Ошибка сети');
            }
        }
        
        // Отправка нового обращения
        async function submitTicket() {
            const name = document.getElementById('name').value.trim() || 'Гость';
            const message = document.getElementById('message').value.trim();
            
            if (!message) return;
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').textContent = '⏳ Отправка...';
            
            try {
                const resp = await fetch(API_URL + '/api/submit_ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        name: name,
                        message: message,
                        username: currentUser.username || ''
                    })
                });
                
                const data = await resp.json();
                if (data.ok) {
                    tg.showAlert('✅ Обращение #' + data.ticket_id + ' отправлено!');
                    document.getElementById('message').value = '';
                    document.getElementById('submit-btn').disabled = true;
                    document.getElementById('submit-btn').textContent = '📤 Отправить';
                } else {
                    tg.showAlert('❌ Ошибка: ' + data.error);
                    document.getElementById('submit-btn').disabled = false;
                    document.getElementById('submit-btn').textContent = '📤 Отправить';
                }
            } catch (e) {
                tg.showAlert('❌ Ошибка сети');
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').textContent = '📤 Отправить';
            }
        }
        
        // Назад
        function goBack() {
            document.getElementById('ticket-detail').style.display = 'none';
            document.getElementById('reply-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            showTab('my');
        }
        
        tg.BackButton.show();
        tg.BackButton.onClick(function() {
            if (document.getElementById('reply-screen').style.display === 'block') {
                document.getElementById('reply-screen').style.display = 'none';
                document.getElementById('ticket-detail').style.display = 'block';
            } else if (document.getElementById('ticket-detail').style.display === 'block') {
                goBack();
            } else {
                tg.close();
            }
        });
        
        init();
    </script>
</body>
</html>
