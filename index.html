<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 20px; font-size: 18px; width: 100%; background: #007aff; color: #fff; border: none; border-radius: 10px; margin-bottom: 10px; }
        #log { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .ok { color: green; }
        .err { color: red; }
    </style>
</head>
<body>
    <h2>🧪 Тест Mini App (все способы)</h2>
    
    <button id="test-senddata">📤 Способ 1: tg.sendData()</button>
    <button id="test-api">📤 Способ 2: Прямой API-запрос</button>
    <button id="test-fetch">📤 Способ 3: fetch к боту</button>
    
    <div id="log">
        <b>Логи:</b>
    </div>

    <script>
        const logEl = document.getElementById('log');
        const BOT_TOKEN = "8748160107:AAFmDVh8VjkPzlBakqnZYF7fVPZHtrNVazs";
        
        function log(msg, type) {
            const cls = type === 'err' ? 'err' : type === 'ok' ? 'ok' : '';
            logEl.innerHTML += `\n<span class="${cls}">${msg}</span>`;
        }
        
        try {
            const tg = window.Telegram.WebApp;
            log('[1] Telegram WebApp: ✓', 'ok');
            log('[2] Платформа: ' + tg.platform);
            log('[3] tg.initData: ' + (tg.initData ? 'есть (' + tg.initData.substring(0, 50) + '...)' : 'ОТСУТСТВУЕТ!'), tg.initData ? 'ok' : 'err');
            
            tg.expand();
            tg.ready();
            
            const userId = tg.initDataUnsafe?.user?.id || 'неизвестен';
            log('[4] User ID: ' + userId);
            
            // Способ 1: tg.sendData
            document.getElementById('test-senddata').addEventListener('click', function() {
                const data = JSON.stringify({ name: "Тест", message: "Через sendData " + new Date().toLocaleTimeString() });
                log('[sendData] Отправка: ' + data);
                try {
                    tg.sendData(data);
                    log('[sendData] ✅ Выполнен', 'ok');
                    tg.showAlert('sendData выполнен');
                } catch(e) {
                    log('[sendData] ❌ Ошибка: ' + e.message, 'err');
                }
            });
            
            // Способ 2: Прямой запрос к Telegram API
            document.getElementById('test-api').addEventListener('click', async function() {
                const text = "Тест через API " + new Date().toLocaleTimeString();
                log('[API] Отправка сообщения боту...');
                
                try {
                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: userId,
                            text: '📩 Сообщение из Mini App (API): ' + text
                        })
                    });
                    const result = await response.json();
                    if (result.ok) {
                        log('[API] ✅ Сообщение отправлено!', 'ok');
                        tg.showAlert('✅ Сообщение отправлено через API!');
                    } else {
                        log('[API] ❌ Ошибка: ' + JSON.stringify(result), 'err');
                    }
                } catch(e) {
                    log('[API] ❌ Ошибка сети: ' + e.message, 'err');
                }
            });
            
            // Способ 3: fetch с initData
            document.getElementById('test-fetch').addEventListener('click', async function() {
                log('[fetch] Отправка с initData...');
                try {
                    const response = await fetch('https://httpbin.org/post', {
                        method: 'POST',
                        body: JSON.stringify({
                            initData: tg.initData,
                            user: tg.initDataUnsafe?.user
                        })
                    });
                    log('[fetch] ✅ Статус: ' + response.status, 'ok');
                    tg.showAlert('fetch выполнен, статус: ' + response.status);
                } catch(e) {
                    log('[fetch] ❌ Ошибка: ' + e.message, 'err');
                }
            });
            
        } catch(e) {
            log('❌ ОШИБКА: ' + e.message, 'err');
        }
    </script>
</body>
</html>
