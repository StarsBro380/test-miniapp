<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    tg.setHeaderColor('#0f0f1a');
    tg.setBackgroundColor('#0f0f1a');

    const API_URL = "https://feedback-bot-1-6z88.onrender.com";
    const ADMIN_IDS = [39444699, 5711571612];

    let currentUser = null;
    let currentTicketId = null;
    let currentReplyUserId = null;

    // ===== ПАРАЛЛАКС-ЭФФЕКТ =====
    const bgImage = document.querySelector('.bg-image');

    // Гироскоп (телефон)
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', function(e) {
            const gamma = e.gamma || 0;
            const beta = e.beta || 0;
            const moveX = gamma / 45 * 15;
            const moveY = beta / 90 * 15;
            bgImage.style.transform = `scale(1.15) translate(${moveX}px, ${moveY}px)`;
        });
    }

    // Мышь (десктоп)
    document.addEventListener('mousemove', function(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        bgImage.style.transform = `scale(1.15) translate(${x}px, ${y}px)`;
    });

    // ===== ОСНОВНЫЕ ФУНКЦИИ =====
    function init() {
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            currentUser = tg.initDataUnsafe.user;
            document.getElementById('name').value = currentUser.first_name || '';

            if (currentUser.id) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';

                document.getElementById('message').addEventListener('input', function() {
                    document.getElementById('char-count').textContent = this.value.length;
                    document.getElementById('submit-btn').disabled = this.value.trim().length === 0;
                });
            }
        } else {
            document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Ошибка загрузки</p>';
        }
    }

    function showTab(tab) {
        document.getElementById('tab-new').classList.toggle('active', tab === 'new');
        document.getElementById('tab-my').classList.toggle('active', tab === 'my');
        document.getElementById('tab-new-content').style.display = tab === 'new' ? 'block' : 'none';
        document.getElementById('tab-my-content').style.display = tab === 'my' ? 'block' : 'none';
        if (tab === 'my') loadMyTickets();
    }

    async function loadMyTickets() {
        const list = document.getElementById('tickets-list');
        list.innerHTML = '<div style="text-align:center;padding:40px;"><div class="spinner"></div></div>';

        try {
            const resp = await fetch(API_URL + '/api/tickets?user_id=' + currentUser.id);
            const data = await resp.json();

            if (!data.ok || !data.tickets.length) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>У вас пока нет обращений</p><button class="btn btn-secondary" style="margin-top:16px;" onclick="showTab('new')">Создать первое</button></div>`;
                return;
            }

            list.innerHTML = '';
            for (const ticket of data.tickets) {
                const status = ticket.status === 'open' ? 'status-open' : 'status-closed';
                const statusText = ticket.status === 'open' ? 'Открыто' : 'Закрыто';
                const msgs = ticket.messages || [];
                const preview = msgs.length > 0 ? msgs[0] : 'Нет текста';
                const replies = ticket.replies || [];
                const replyInfo = replies.length > 0 ? `<div class="reply-count">💬 ${replies.length} ответ${replies.length > 1 ? 'ов' : ''}</div>` : '';

                const card = document.createElement('div');
                card.className = `card ${status} slide-up`;
                card.onclick = function() { showTicketDetail(ticket); };
                card.innerHTML = `<div class="card-header"><span class="ticket-id">#${ticket.id}</span><span class="status-badge">${statusText}</span></div><div class="preview">${preview}</div>${replyInfo}`;
                list.appendChild(card);
            }
        } catch (e) {
            list.innerHTML = '<p style="color:var(--danger);text-align:center;">Ошибка загрузки</p>';
        }
    }

    function showTicketDetail(ticket) {
        document.getElementById('main-screen').style.display = 'none';
        const detail = document.getElementById('ticket-detail');
        detail.style.display = 'block';

        const status = ticket.status === 'open' ? 'Открыто' : 'Закрыто';
        let html = `<button class="btn btn-secondary" onclick="goBack()">Назад</button>`;
        html += `<div style="margin-top:20px;">`;
        html += `<h2 style="font-size:22px;margin-bottom:8px;">Обращение #${ticket.id}</h2>`;
        html += `<p style="color:var(--text-secondary);margin-bottom:24px;">${status}</p>`;

        if (ticket.messages && ticket.messages.length > 0) {
            html += `<div class="detail-section"><h3>Сообщения</h3>`;
            for (const msg of ticket.messages) {
                html += `<div class="message-bubble">${msg}</div>`;
            }
            html += `</div>`;
        }

        if (ticket.replies && ticket.replies.length > 0) {
            html += `<div class="detail-section"><h3>Ответы</h3>`;
            for (const reply of ticket.replies) {
                html += `<div class="reply-bubble"><div class="reply-header"><span class="reply-admin">${reply.admin}</span><span class="reply-time">${reply.time}</span></div><div class="reply-text">${reply.text}</div></div>`;
            }
            html += `</div>`;
        }

        if (ADMIN_IDS.includes(currentUser.id) && ticket.status === 'open') {
            currentTicketId = ticket.id;
            currentReplyUserId = ticket.user_id;
            html += `<button class="btn btn-primary" onclick="showReplyScreen()">Ответить</button>`;
        }

        html += `</div>`;
        detail.innerHTML = html;
    }

    function showReplyScreen() {
        document.getElementById('ticket-detail').style.display = 'none';
        document.getElementById('reply-screen').style.display = 'block';
    }

    async function sendReply() {
        const text = document.getElementById('reply-text').value.trim();
        if (!text) { tg.showAlert('Введите текст ответа'); return; }

        try {
            const resp = await fetch(API_URL + '/api/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_id: currentUser.id, user_id: currentReplyUserId, ticket_id: currentTicketId, text: text })
            });
            const data = await resp.json();
            if (data.ok) {
                tg.showAlert('Ответ отправлен!');
                document.getElementById('reply-screen').style.display = 'none';
                document.getElementById('reply-text').value = '';
                goBack();
            } else {
                tg.showAlert(data.error);
            }
        } catch (e) {
            tg.showAlert('Ошибка сети');
        }
    }

    async function submitTicket() {
        const name = document.getElementById('name').value.trim() || 'Гость';
        const message = document.getElementById('message').value.trim();
        if (!message) return;

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Отправка...';

        try {
            const resp = await fetch(API_URL + '/api/submit_ticket', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUser.id, name: name, message: message, username: currentUser.username || '' })
            });
            const data = await resp.json();
            if (data.ok) {
                tg.showAlert('Обращение #' + data.ticket_id + ' отправлено!');
                document.getElementById('message').value = '';
                document.getElementById('char-count').textContent = '0';
                btn.disabled = true;
                btn.textContent = 'Отправить обращение';
                showTab('my');
            } else {
                tg.showAlert(data.error);
                btn.disabled = false;
                btn.textContent = 'Отправить обращение';
            }
        } catch (e) {
            tg.showAlert('Ошибка сети');
            btn.disabled = false;
            btn.textContent = 'Отправить обращение';
        }
    }

    function goBack() {
        document.getElementById('ticket-detail').style.display = 'none';
        document.getElementById('reply-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        showTab('my');
    }

    tg.BackButton.show();
    tg.BackButton.onClick(function() {
        if (document.getElementById('reply-screen').style.display === 'block') {
            document.getElementById('reply-screen').style.display = 'none';
            document.getElementById('ticket-detail').style.display = 'block';
        } else if (document.getElementById('ticket-detail').style.display === 'block') {
            goBack();
        } else {
            tg.close();
        }
    });

    init();
</script>
