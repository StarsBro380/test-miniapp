<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обратная связь</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: var(--tg-theme-hint-color, #8e8e93); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        input, textarea {
            width: 100%; padding: 14px 16px; font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #c6c6c8); border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            color: var(--tg-theme-text-color, #000000);
        }
        textarea { min-height: 120px; resize: vertical; }
        .buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1; padding: 16px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer;
        }
        .btn-primary { background: var(--tg-theme-button-color, #007aff); color: #ffffff; }
        .btn-secondary { background: var(--tg-theme-secondary-bg-color, #f2f2f7); color: var(--tg-theme-text-color, #000000); }
        .btn:disabled { opacity: 0.5; }
        .success-message { text-align: center; padding: 40px 20px; display: none; }
        .success-message h2 { font-size: 22px; margin-bottom: 8px; }
        .success-message p { color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 24px; }
        .loading { text-align: center; padding: 40px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Форма -->
        <div id="form-container">
            <h1>📝 Обратная связь</h1>
            <p class="subtitle">Опишите ваш вопрос или предложение. Мы ответим в ближайшее время.</p>
            
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" placeholder="Как к вам обращаться?">
            </div>
            
            <div class="form-group">
                <label for="message">Сообщение *</label>
                <textarea id="message" placeholder="Опишите ваш вопрос..."></textarea>
            </div>
            
            <div class="buttons">
                <button class="btn btn-secondary" id="cancel-btn">❌ Отмена</button>
                <button class="btn btn-primary" id="submit-btn" disabled>📤 Отправить</button>
            </div>
        </div>
        
        <!-- Загрузка -->
        <div class="loading" id="loading">
            <p>⏳ Отправка обращения...</p>
        </div>
        
        <!-- Успех -->
        <div class="success-message" id="success-container">
            <h2>✅ Обращение отправлено!</h2>
            <p>Спасибо! Мы ответим вам в ближайшее время.</p>
            <button class="btn btn-primary" id="close-btn">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Токен тестового бота
        const BOT_TOKEN = "8748160107:AAFmDVh8VjkPzlBakqnZYF7fVPZHtrNVazs";
        
        const formContainer = document.getElementById('form-container');
        const successContainer = document.getElementById('success-container');
        const loading = document.getElementById('loading');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');
        
        // Автозаполнение имени
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            nameInput.value = tg.initDataUnsafe.user.first_name || '';
        }
        
        // Валидация
        messageInput.addEventListener('input', function() {
            submitBtn.disabled = this.value.trim().length === 0;
        });
        
        // Отправка через API Telegram
        submitBtn.addEventListener('click', async function() {
            const name = nameInput.value.trim() || 'Гость';
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            submitBtn.disabled = true;
            formContainer.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                const userId = tg.initDataUnsafe?.user?.id || 'неизвестен';
                const text = `📩 Новое обращение через Mini App\n\n👤 ${name}\n🆔 ${userId}\n\n📝 Сообщение:\n${message}`;
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userId,
                        text: '✅ Ваше обращение отправлено! Администратор скоро ответит.'
                    })
                });
                
                // Отправляем админам
                const ADMIN_IDS = [39444699, 5711571612];
                for (const adminId of ADMIN_IDS) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: adminId,
                            text: text
                        })
                    });
                }
                
                loading.style.display = 'none';
                successContainer.style.display = 'block';
                
            } catch (error) {
                loading.style.display = 'none';
                formContainer.style.display = 'block';
                submitBtn.disabled = false;
                tg.showAlert('Ошибка отправки. Попробуйте ещё раз.');
            }
        });
        
        // Отмена
        document.getElementById('cancel-btn').addEventListener('click', function() {
            tg.close();
        });
        
        // Закрытие после успеха
        document.getElementById('close-btn').addEventListener('click', function() {
            tg.close();
        });
        
        // Кнопка назад
        tg.BackButton.show();
        tg.BackButton.onClick(function() {
            tg.close();
        });
    </script>
</body>
</html>
