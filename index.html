<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h2>Тест отправки</h2>
    <button id="btn" style="padding: 20px; font-size: 20px;">ОТПРАВИТЬ ТЕСТ</button>
    <div id="log" style="margin-top: 20px; padding: 10px; background: #eee;"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        document.getElementById('btn').addEventListener('click', function() {
            document.getElementById('log').innerHTML = 'Отправка...';
            tg.sendData(JSON.stringify({name: "Тест", message: "Привет"}));
            document.getElementById('log').innerHTML = '✅ Отправлено!';
            tg.showAlert('Отправлено!');
        });
    </script>
</body>
</html>
