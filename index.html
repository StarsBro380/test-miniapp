<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        h2 { margin-bottom: 16px; }
        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ccc; border-radius: 8px;
            font-size: 16px;
        }
        textarea { height: 100px; }
        button {
            width: 100%; padding: 16px; margin-top: 12px;
            background: var(--tg-theme-button-color, #007aff);
            color: #fff; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        #status {
            margin-top: 16px; padding: 12px;
            background: #f0f0f0; border-radius: 8px;
            font-family: monospace; font-size: 13px;
        }
    </style>
</head>
<body>
    <h2>🧪 Тестовый Mini App</h2>
    
    <input type="text" id="name" placeholder="Ваше имя">
    <textarea id="message" placeholder="Тестовое сообщение"></textarea>
    <button id="send-btn">📤 Отправить тест</button>
    
    <div id="status">⏳ Ожидание...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const status = document.getElementById('status');
        
        function log(msg) {
            status.innerHTML += '<br>' + msg;
        }
        
        log('✅ Mini App готов');
        log('📱 Платформа: ' + tg.platform);
        
        // Автозаполнение имени
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('name').value = tg.initDataUnsafe.user.first_name || '';
            log('👤 Пользователь: ' + tg.initDataUnsafe.user.first_name);
        }
        
        document.getElementById('send-btn').addEventListener('click', function() {
            const name = document.getElementById('name').value || 'Гость';
            const message = document.getElementById('message').value || 'Тест';
            
            const data = JSON.stringify({ name: name, message: message });
            
            log('📤 Отправка: ' + data);
            
            try {
                tg.sendData(data);
                log('✅ tg.sendData() выполнен!');
                tg.showAlert('✅ Данные отправлены боту!');
            } catch(e) {
                log('❌ Ошибка: ' + e.message);
                tg.showAlert('❌ Ошибка: ' + e.message);
            }
        });
        
        tg.BackButton.show();
        tg.BackButton.onClick(() => tg.close());
    </script>
</body>
</html>
