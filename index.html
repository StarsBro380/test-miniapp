<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обратная связь</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: var(--tg-theme-hint-color, #8e8e93); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        input, textarea {
            width: 100%; padding: 14px 16px; font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #c6c6c8); border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            color: var(--tg-theme-text-color, #000000); font-family: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }
        .file-label {
            display: block; padding: 14px 16px;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            border: 1px dashed var(--tg-theme-hint-color, #c6c6c8); border-radius: 12px;
            text-align: center; cursor: pointer; font-size: 14px;
            color: var(--tg-theme-button-color, #007aff);
        }
        .file-label input { display: none; }
        .file-list { margin-top: 12px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            border-radius: 8px; margin-bottom: 6px; font-size: 13px;
        }
        .file-item .remove { background: none; border: none; color: #ff3b30; font-size: 18px; cursor: pointer; }
        .buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1; padding: 16px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer;
        }
        .btn-primary { background: var(--tg-theme-button-color, #007aff); color: #ffffff; }
        .btn-secondary { background: var(--tg-theme-secondary-bg-color, #f2f2f7); color: var(--tg-theme-text-color, #000000); }
        .btn:disabled { opacity: 0.5; }
        .success-message { text-align: center; padding: 40px 20px; display: none; }
        .success-message .icon { font-size: 64px; margin-bottom: 16px; }
        .success-message h2 { font-size: 22px; margin-bottom: 8px; }
        .success-message p { color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 24px; }
        .loading { text-align: center; padding: 40px; display: none; }
        .char-count { text-align: right; font-size: 12px; color: var(--tg-theme-hint-color, #8e8e93); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Форма -->
        <div id="form-container">
            <h1>📝 Обратная связь</h1>
            <p class="subtitle">Опишите ваш вопрос или предложение. Мы ответим в ближайшее время.</p>
            
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" placeholder="Как к вам обращаться?">
            </div>
            
            <div class="form-group">
                <label for="message">Сообщение *</label>
                <textarea id="message" placeholder="Опишите ваш вопрос..." maxlength="2000"></textarea>
                <div class="char-count"><span id="char-count">0</span>/2000</div>
            </div>
            
            <div class="form-group">
                <label class="file-label" for="file-input">
                    📎 Прикрепить файлы (до 5 шт.)
                    <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt,.zip">
                </label>
                <div class="file-list" id="file-list"></div>
            </div>
            
            <div class="buttons">
                <button class="btn btn-secondary" id="cancel-btn">❌ Отмена</button>
                <button class="btn btn-primary" id="submit-btn" disabled>📤 Отправить</button>
            </div>
        </div>
        
        <!-- Загрузка -->
        <div class="loading" id="loading">
            <p>⏳ Отправка обращения...</p>
        </div>
        
        <!-- Успех -->
        <div class="success-message" id="success-container">
            <div class="icon">✅</div>
            <h2>Обращение отправлено!</h2>
            <p>Спасибо! Мы ответим вам в ближайшее время.</p>
            <button class="btn btn-primary" id="close-btn">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // ===== НАСТРОЙКИ ОСНОВНОГО БОТА =====
        const BOT_TOKEN = "8626444342:AAESEy8xC2NTRMKWewFHGnnBxtjfYZ-R2Fg";
        const ADMIN_IDS = [39444699, 5711571612];
        
        const formContainer = document.getElementById('form-container');
        const successContainer = document.getElementById('success-container');
        const loading = document.getElementById('loading');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const submitBtn = document.getElementById('submit-btn');
        const charCount = document.getElementById('char-count');
        
        let selectedFiles = [];
        const MAX_FILES = 5;
        const MAX_SIZE = 20 * 1024 * 1024; // 20 MB
        
        // Автозаполнение имени
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            nameInput.value = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        }
        
        // Подсчёт символов
        messageInput.addEventListener('input', function() {
            charCount.textContent = this.value.length;
            validateForm();
        });
        
        // Валидация
        function validateForm() {
            const hasText = messageInput.value.trim().length > 0;
            const hasFiles = selectedFiles.length > 0;
            submitBtn.disabled = !hasText && !hasFiles;
        }
        
        // Обновление списка файлов
        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                
                const name = document.createElement('span');
                name.style.flex = '1';
                name.style.overflow = 'hidden';
                name.style.textOverflow = 'ellipsis';
                name.style.whiteSpace = 'nowrap';
                name.textContent = file.name;
                
                const remove = document.createElement('button');
                remove.className = 'remove';
                remove.textContent = '✕';
                remove.onclick = function() {
                    selectedFiles.splice(index, 1);
                    updateFileList();
                    validateForm();
                };
                
                div.appendChild(name);
                div.appendChild(remove);
                fileList.appendChild(div);
            });
            validateForm();
        }
        
        // Выбор файлов
        fileInput.addEventListener('change', function(e) {
            const newFiles = Array.from(e.target.files);
            
            if (selectedFiles.length + newFiles.length > MAX_FILES) {
                tg.showAlert(`Максимум ${MAX_FILES} файлов`);
                return;
            }
            
            for (let file of newFiles) {
                if (file.size > MAX_SIZE) {
                    tg.showAlert(`Файл "${file.name}" слишком большой (макс. 20 MB)`);
                    return;
                }
            }
            
            selectedFiles = [...selectedFiles, ...newFiles];
            updateFileList();
            fileInput.value = '';
        });
        
        // Отправка формы
        submitBtn.addEventListener('click', async function() {
            const name = nameInput.value.trim() || 'Гость';
            const message = messageInput.value.trim();
            
            if (!message && selectedFiles.length === 0) {
                tg.showAlert('Напишите сообщение или прикрепите файл');
                return;
            }
            
            submitBtn.disabled = true;
            formContainer.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                const userId = tg.initDataUnsafe?.user?.id || 'неизвестен';
                const username = tg.initDataUnsafe?.user?.username || '';
                const userInfo = username ? `${name} (@${username})` : name;
                
                // Отправляем подтверждение пользователю
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userId,
                        text: '✅ Ваше обращение отправлено! Администратор скоро ответит.'
                    })
                });
                
                // Отправляем уведомление админам
                let adminText = `📩 Новое обращение через Mini App\n\n`;
                adminText += `👤 ${userInfo}\n`;
                adminText += `🆔 ${userId}\n`;
                if (message) {
                    adminText += `\n📝 Сообщение:\n${message}\n`;
                }
                if (selectedFiles.length > 0) {
                    adminText += `\n📎 Файлов: ${selectedFiles.length} шт.\n`;
                }
                
                for (const adminId of ADMIN_IDS) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: adminId,
                            text: adminText
                        })
                    });
                }
                
                // Отправляем файлы админам
                for (const file of selectedFiles) {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        const base64 = e.target.result.split(',')[1];
                        for (const adminId of ADMIN_IDS) {
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    chat_id: adminId,
                                    document: { file_data: base64, file_name: file.name },
                                    caption: `📎 Файл от ${userInfo}`
                                })
                            });
                        }
                    };
                    reader.readAsDataURL(file);
                }
                
                loading.style.display = 'none';
                successContainer.style.display = 'block';
                
            } catch (error) {
                loading.style.display = 'none';
                formContainer.style.display = 'block';
                submitBtn.disabled = false;
                tg.showAlert('Ошибка отправки. Попробуйте ещё раз.');
            }
        });
        
        // Отмена
        document.getElementById('cancel-btn').addEventListener('click', function() {
            if (messageInput.value.trim() || selectedFiles.length > 0) {
                tg.showConfirm('Отменить обращение? Все данные будут потеряны.', function(ok) {
                    if (ok) tg.close();
                });
            } else {
                tg.close();
            }
        });
        
        // Закрытие после успеха
        document.getElementById('close-btn').addEventListener('click', function() {
            tg.close();
        });
        
        tg.BackButton.show();
        tg.BackButton.onClick(function() {
            if (messageInput.value.trim() || selectedFiles.length > 0) {
                tg.showConfirm('Отменить обращение?', function(ok) {
                    if (ok) tg.close();
                });
            } else {
                tg.close();
            }
        });
        
        validateForm();
    </script>
</body>
</html>
